name: Docs CI

on:
  push:
    branches: ["main"]
    paths:
      - "docs/**"
      - ".github/workflows/docs-ci.yml"
      - "BRANCHING_STRATEGY.md"
      - "ARCHITECTURE.md"
      - "CI_CD_IMPLEMENTATION.md"
      - "CONTRIBUTING.md"
      - "DOCUMENTATION.md"
      - "QUICKSTART.md"
      - "README.md"
      - "TESTING_STRATEGY.md"
      - "TROUBLESHOOTING.md"
  pull_request:
    branches: ["main"]
    paths:
      - "docs/**"
      - ".github/workflows/docs-ci.yml"
      - "BRANCHING_STRATEGY.md"
      - "ARCHITECTURE.md"
      - "CI_CD_IMPLEMENTATION.md"
      - "CONTRIBUTING.md"
      - "DOCUMENTATION.md"
      - "QUICKSTART.md"
      - "README.md"
      - "TESTING_STRATEGY.md"
      - "TROUBLESHOOTING.md"

jobs:
  validate-markdown:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js (for markdown tools)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install markdown linter
        run: npm install -g markdownlint-cli

      - name: Lint Markdown files
        run: |
          echo "📝 Checking Markdown files..."
          markdownlint docs/**/*.md *.md

  check-links:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js (for link checker)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install markdown link checker
        run: npm install -g markdown-link-check

      - name: Check markdown links
        run: |
          set -euo pipefail
          while IFS= read -r file; do
            echo "🔗 Checking links in $file"
            markdown-link-check "$file"
          done < <(find docs -name '*.md' -print && find . -maxdepth 1 -name '*.md' -print)

  build-summary:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Count documentation files
        run: |
          echo "📊 Documentation Summary"
          echo "- Docs files: $(find docs -name '*.md' | wc -l)"
          echo "- Root docs: $(ls -1 *.md 2>/dev/null | wc -l)"

      - name: List recent docs
        run: |
          echo "📄 Documentation files:"
          ls -1 docs/*.md | head -5

      - name: Comment PR with summary
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const docsCount = require('child_process')
              .execSync('find docs -name "*.md" | wc -l')
              .toString()
              .trim();
            
            const comment = `✅ Documentation validated\n\n**Stats:**\n- 📄 Markdown files: ${docsCount}`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
