name: Backend CI/CD

on:
  push:
    branches: ["main"]
    paths:
      - "backend/**"
      - ".github/workflows/backend-cd.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "backend/**"
      - ".github/workflows/backend-cd.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy environment'
        required: true
        default: 'prod'
        type: choice
        options:
          - prod
          - staging

permissions:
  contents: read
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run tests
        working-directory: backend
        run: mvn -B verify

  build-and-deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: test
    continue-on-error: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build backend
        working-directory: backend
        run: mvn -B clean package -DskipTests

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ vars.GCP_REGION }}-docker.pkg.dev

      - name: Resolve database host
        run: |
          DB_HOST=$(gcloud sql instances describe rideops-postgres \
            --format='value(ipAddresses[0].ipAddress)')

          if [ -z "$DB_HOST" ]; then
            echo "Unable to resolve Cloud SQL host for rideops-postgres"
            exit 1
          fi

          echo "DB_HOST=$DB_HOST" >> "$GITHUB_ENV"
          echo "DB_PORT=5432" >> "$GITHUB_ENV"
          echo "DB_NAME=rideops" >> "$GITHUB_ENV"
          echo "DB_USER=rideops" >> "$GITHUB_ENV"

      - name: Build Docker image
        run: |
          docker build -t ${{ vars.ARTIFACT_REGISTRY_REPO }}/backend:latest \
                       -t ${{ vars.ARTIFACT_REGISTRY_REPO }}/backend:${{ github.sha }} \
                       -f backend/Dockerfile backend/

      - name: Push Docker image
        run: |
          docker push ${{ vars.ARTIFACT_REGISTRY_REPO }}/backend:latest
          docker push ${{ vars.ARTIFACT_REGISTRY_REPO }}/backend:${{ github.sha }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ vars.BACKEND_SERVICE }} \
            --image ${{ vars.ARTIFACT_REGISTRY_REPO }}/backend:latest \
            --platform managed \
            --region ${{ vars.GCP_REGION }} \
            --allow-unauthenticated \
            --port 8080 \
            --set-env-vars SPRING_PROFILES_ACTIVE=prod,DB_HOST=${DB_HOST},DB_PORT=${DB_PORT},DB_NAME=${DB_NAME},DB_USER=${DB_USER} \
            --min-instances 1

      - name: Verify deployment
        run: |
          gcloud run services describe ${{ vars.BACKEND_SERVICE }} \
            --region ${{ vars.GCP_REGION }} \
            --format='value(status.url)'

      - name: Slack notification (success)
        if: success() && env.SLACK_WEBHOOK != ''
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data '{"text":"✅ Backend deployed successfully - repo: ${{ github.repository }}, branch: ${{ github.ref_name }}, commit: ${{ github.sha }}, workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}' \
            "$SLACK_WEBHOOK"

      - name: Slack notification (failure)
        if: failure() && env.SLACK_WEBHOOK != ''
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data '{"text":"❌ Backend deployment failed - repo: ${{ github.repository }}, branch: ${{ github.ref_name }}, commit: ${{ github.sha }}, workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}' \
            "$SLACK_WEBHOOK"
