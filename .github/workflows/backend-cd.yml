name: Backend CI/CD

on:
  push:
    branches: ["main"]
    paths:
      - "backend/**"
      - ".github/workflows/backend-cd.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "backend/**"
      - ".github/workflows/backend-cd.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy environment'
        required: true
        default: 'prod'
        type: choice
        options:
          - prod
          - staging

permissions:
  contents: read
  id-token: write

concurrency:
  group: backend-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run tests
        working-directory: backend
        run: mvn -B verify

  build-and-deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: test
    continue-on-error: false
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'prod' }}
    env:
      NOTIFICATION_ENV: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'prod' }}
      SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build backend
        working-directory: backend
        run: mvn -B clean package -DskipTests

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ vars.GCP_REGION }}-docker.pkg.dev

      - name: Resolve deploy target
        run: |
          DEPLOY_ENV="prod"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            DEPLOY_ENV="${{ inputs.environment }}"
          fi

          TARGET_SERVICE="${{ vars.BACKEND_SERVICE }}"
          SPRING_PROFILE="prod"
          if [ "$DEPLOY_ENV" = "staging" ]; then
            TARGET_SERVICE="${{ vars.BACKEND_SERVICE_STAGING || vars.BACKEND_SERVICE }}"
            SPRING_PROFILE="staging"
          fi

          echo "DEPLOY_ENV=$DEPLOY_ENV" >> "$GITHUB_ENV"
          echo "TARGET_SERVICE=$TARGET_SERVICE" >> "$GITHUB_ENV"
          echo "SPRING_PROFILE=$SPRING_PROFILE" >> "$GITHUB_ENV"

      - name: Resolve backend runtime variables
        env:
          DB_HOST_SECRET: ${{ secrets.DB_HOST }}
          DB_HOST_VAR: ${{ vars.DB_HOST }}
          DB_PORT_SECRET: ${{ secrets.DB_PORT }}
          DB_PORT_VAR: ${{ vars.DB_PORT }}
          DB_NAME_SECRET: ${{ secrets.DB_NAME }}
          DB_NAME_VAR: ${{ vars.DB_NAME }}
          DB_USER_SECRET: ${{ secrets.DB_USER }}
          DB_USER_VAR: ${{ vars.DB_USER }}
          DB_PASSWORD_SECRET: ${{ secrets.DB_PASSWORD }}
          JWT_SECRET_SECRET: ${{ secrets.JWT_SECRET }}
          ADMIN_PASSWORD_SECRET: ${{ secrets.ADMIN_PASSWORD }}
        run: |
          DB_HOST_VALUE="${DB_HOST_SECRET:-$DB_HOST_VAR}"
          DB_PORT_VALUE="${DB_PORT_SECRET:-$DB_PORT_VAR}"
          DB_NAME_VALUE="${DB_NAME_SECRET:-$DB_NAME_VAR}"
          DB_USER_VALUE="${DB_USER_SECRET:-$DB_USER_VAR}"

          missing=0
          if [ -z "$DB_HOST_VALUE" ]; then echo "Missing DB_HOST (secret DB_HOST or variable DB_HOST)" >&2; missing=1; fi
          if [ -z "$DB_PORT_VALUE" ]; then echo "Missing DB_PORT (secret DB_PORT or variable DB_PORT)" >&2; missing=1; fi
          if [ -z "$DB_NAME_VALUE" ]; then echo "Missing DB_NAME (secret DB_NAME or variable DB_NAME)" >&2; missing=1; fi
          if [ -z "$DB_USER_VALUE" ]; then echo "Missing DB_USER (secret DB_USER or variable DB_USER)" >&2; missing=1; fi
          if [ -z "$DB_PASSWORD_SECRET" ]; then echo "Missing DB_PASSWORD secret" >&2; missing=1; fi
          if [ -z "$JWT_SECRET_SECRET" ]; then echo "Missing JWT_SECRET secret" >&2; missing=1; fi
          if [ -z "$ADMIN_PASSWORD_SECRET" ]; then echo "Missing ADMIN_PASSWORD secret" >&2; missing=1; fi

          if [ "$missing" -ne 0 ]; then
            echo "Populate required GitHub secrets/variables before deploying backend." >&2
            exit 1
          fi

          echo "DB_HOST=$DB_HOST_VALUE" >> "$GITHUB_ENV"
          echo "DB_PORT=$DB_PORT_VALUE" >> "$GITHUB_ENV"
          echo "DB_NAME=$DB_NAME_VALUE" >> "$GITHUB_ENV"
          echo "DB_USER=$DB_USER_VALUE" >> "$GITHUB_ENV"
          echo "DB_PASSWORD=$DB_PASSWORD_SECRET" >> "$GITHUB_ENV"
          echo "JWT_SECRET=$JWT_SECRET_SECRET" >> "$GITHUB_ENV"
          echo "ADMIN_PASSWORD=$ADMIN_PASSWORD_SECRET" >> "$GITHUB_ENV"

      - name: Build Docker image
        run: |
          docker build -t ${{ vars.ARTIFACT_REGISTRY_REPO }}/backend:latest \
                       -t ${{ vars.ARTIFACT_REGISTRY_REPO }}/backend:${{ github.sha }} \
                       -f backend/Dockerfile backend/

      - name: Push Docker image
        run: |
          docker push ${{ vars.ARTIFACT_REGISTRY_REPO }}/backend:latest
          docker push ${{ vars.ARTIFACT_REGISTRY_REPO }}/backend:${{ github.sha }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "$TARGET_SERVICE" \
            --image ${{ vars.ARTIFACT_REGISTRY_REPO }}/backend:latest \
            --platform managed \
            --region ${{ vars.GCP_REGION }} \
            --allow-unauthenticated \
            --port 8080 \
            --set-env-vars SPRING_PROFILES_ACTIVE=${SPRING_PROFILE},DB_HOST=${DB_HOST},DB_PORT=${DB_PORT},DB_NAME=${DB_NAME},DB_USER=${DB_USER},DB_PASSWORD=${DB_PASSWORD},JWT_SECRET=${JWT_SECRET},ADMIN_PASSWORD=${ADMIN_PASSWORD} \
            --min-instances 1

      - name: Verify deployment
        run: |
          gcloud run services describe "$TARGET_SERVICE" \
            --region ${{ vars.GCP_REGION }} \
            --format='value(status.url)'

      - name: Run smoke test
        run: |
          BACKEND_URL=$(gcloud run services describe "$TARGET_SERVICE" \
            --region ${{ vars.GCP_REGION }} \
            --format='value(status.url)')

          echo "Testing backend health at: $BACKEND_URL/actuator/health"
          for attempt in 1 2 3 4 5; do
            if curl -f -s "$BACKEND_URL/actuator/health" > /dev/null; then
              echo "Backend is healthy"
              exit 0
            fi

            echo "Health check attempt $attempt failed, retrying in 10s..."
            sleep 10
          done

          echo "Backend smoke test failed after retries"
          exit 1

      - name: Slack notification (success)
        if: success() && env.SLACK_WEBHOOK != ''
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"Backend deployed successfully - repo: ${{ github.repository }}, env: ${NOTIFICATION_ENV}, branch: ${{ github.ref_name }}, commit: ${{ github.sha }}, workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
            "$SLACK_WEBHOOK"

      - name: Slack notification (failure)
        if: failure() && env.SLACK_WEBHOOK != ''
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"Backend deployment failed - repo: ${{ github.repository }}, env: ${NOTIFICATION_ENV}, branch: ${{ github.ref_name }}, commit: ${{ github.sha }}, workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
            "$SLACK_WEBHOOK"
