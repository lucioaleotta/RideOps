name: Frontend CI/CD

on:
  push:
    branches: ["main"]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-cd.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-cd.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy environment'
        required: true
        default: 'prod'
        type: choice
        options:
          - prod
          - staging

permissions:
  contents: read
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run linter
        working-directory: frontend
        run: npm run lint

      - name: Build
        working-directory: frontend
        run: npm run build

  build-and-deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Next.js app
        working-directory: frontend
        run: npm run build

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ vars.GCP_REGION }}-docker.pkg.dev

      - name: Resolve backend URL
        run: |
          BACKEND_URL=$(gcloud run services describe ${{ vars.BACKEND_SERVICE }} \
            --region ${{ vars.GCP_REGION }} \
            --format='value(status.url)')

          if [ -z "$BACKEND_URL" ]; then
            echo "Unable to resolve backend URL from Cloud Run service ${{ vars.BACKEND_SERVICE }}"
            exit 1
          fi

          echo "BACKEND_URL=$BACKEND_URL" >> "$GITHUB_ENV"

      - name: Build Docker image
        run: |
          docker build -t ${{ vars.ARTIFACT_REGISTRY_REPO }}/frontend:latest \
                       -t ${{ vars.ARTIFACT_REGISTRY_REPO }}/frontend:${{ github.sha }} \
                       -f frontend/Dockerfile frontend/

      - name: Push Docker image
        run: |
          docker push ${{ vars.ARTIFACT_REGISTRY_REPO }}/frontend:latest
          docker push ${{ vars.ARTIFACT_REGISTRY_REPO }}/frontend:${{ github.sha }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ vars.FRONTEND_SERVICE }} \
            --image ${{ vars.ARTIFACT_REGISTRY_REPO }}/frontend:latest \
            --platform managed \
            --region ${{ vars.GCP_REGION }} \
            --allow-unauthenticated \
            --port 3000 \
            --set-env-vars BACKEND_URL=${BACKEND_URL},FRONTEND_ENV=prod \
            --min-instances 1

      - name: Verify deployment
        run: |
          gcloud run services describe ${{ vars.FRONTEND_SERVICE }} \
            --region ${{ vars.GCP_REGION }} \
            --format='value(status.url)'

      - name: Run smoke tests
        run: |
          FRONTEND_URL=$(gcloud run services describe ${{ vars.FRONTEND_SERVICE }} \
            --region ${{ vars.GCP_REGION }} \
            --format='value(status.url)')
          
          echo "Testing frontend health at: $FRONTEND_URL/login"
          curl -f -s "$FRONTEND_URL/login" > /dev/null && echo "✅ Frontend is healthy" || exit 1

      - name: Slack notification (success)
        if: success() && env.SLACK_WEBHOOK != ''
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data '{"text":"✅ Frontend deployed successfully - repo: ${{ github.repository }}, branch: ${{ github.ref_name }}, commit: ${{ github.sha }}, workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}' \
            "$SLACK_WEBHOOK"

      - name: Slack notification (failure)
        if: failure() && env.SLACK_WEBHOOK != ''
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data '{"text":"❌ Frontend deployment failed - repo: ${{ github.repository }}, branch: ${{ github.ref_name }}, commit: ${{ github.sha }}, workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}' \
            "$SLACK_WEBHOOK"
