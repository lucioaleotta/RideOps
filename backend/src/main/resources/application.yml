spring:
  application:
    name: rideops
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:rideops}
    username: ${DB_USER:rideops}
    password: ${DB_PASSWORD:rideops}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

server:
  port: ${SERVER_PORT:8080}

security:
  jwt:
    secret: ${JWT_SECRET:change-this-secret-change-this-secret-2026}
    expiration-seconds: ${JWT_EXPIRATION_SECONDS:3600}

rideops:
  security:
    admin:
      user-id: ${ADMIN_USER_ID:admin}
      email: ${ADMIN_EMAIL:admin@rideops.local}
      password: ${ADMIN_PASSWORD:ChangeMe123!}
